apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: datadog-presales-practice-simulator
  namespace: '__GCP_PROJECT_NUMBER__'
  labels:
    cloud.googleapis.com/location: us-west1
    service: datadog-presales-practice-simulator
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/iap-enabled: 'true'
    run.googleapis.com/client-name: cloud-console
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/sessionAffinity: 'true'
        autoscaling.knative.dev/minScale: '1'
        autoscaling.knative.dev/maxScale: '30'
        # nginx-container waits for app-container to be healthy before accepting traffic
        run.googleapis.com/container-dependencies: '{"nginx-container":["app-container"]}'
        run.googleapis.com/cpu-throttling: 'false'
    spec:
      containerConcurrency: 160
      timeoutSeconds: 600
      serviceAccountName: __GCP_PROJECT_NUMBER__-compute@developer.gserviceaccount.com
      containers:

        # ── Ingress container (port 8080) ─────────────────────────────────────
        # AI Studio proxy: receives external traffic and forwards to app-container
        # on localhost:3000. GEMINI_API_KEY is pulled from GCP Secret Manager.
        - name: nginx-container
          image: us-west1-docker.pkg.dev/ai-studio-registry-prod/ai-studio/deploy-container@sha256:ad9b1d5c6cc21099fa078e6593ef3c70cf20fb84545d6dffd245211c6dcc79eb
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: APPLET_ID
              value: __APPLET_ID__
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: GEMINI_API_KEY
                  key: latest
          resources:
            limits:
              cpu: '0.5'
              memory: 512Mi
          startupProbe:
            timeoutSeconds: 240
            periodSeconds: 240
            failureThreshold: 1
            tcpSocket:
              port: 8080

        # ── App container (port 3000) ──────────────────────────────────────────
        # Our own Next.js app image (built from this repo via Dockerfile).
        # API keys and Datadog config are injected at runtime from GCP Secret Manager.
        - name: app-container
          image: __APP_IMAGE__
          env:
            - name: PORT
              value: '3000'
            - name: APP_URL
              value: __APP_URL__
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: GEMINI_API_KEY
                  key: latest
            - name: DD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: DD_API_KEY
                  key: latest
            - name: DD_SITE
              value: datadoghq.com
            - name: DD_ENV
              value: __DD_ENV__
            - name: DD_SERVICE
              value: datadog-presales-practice-simulator
            - name: DD_LOGS_ENABLED
              value: 'true'
            - name: DD_LOGS_INJECTION
              value: 'true'
            - name: DD_VERSION
              value: '__SHORT_SHA__'
            - name: DD_SOURCE
              value: nodejs
            - name: DD_TAGS
              value: team:presales-practice
            - name: DD_GIT_COMMIT_SHA
              value: '__FULL_SHA__'
            - name: DD_GIT_REPOSITORY_URL
              value: __GIT_REPO_URL__
            - name: DD_LLMOBS_ENABLED
              value: '1'
            - name: DD_LLMOBS_ML_APP
              value: presales-practice-simulator
          resources:
            limits:
              cpu: '1'
              memory: 3Gi
          startupProbe:
            timeoutSeconds: 1
            periodSeconds: 1
            failureThreshold: 30
            httpGet:
              path: /
              port: 3000

  traffic:
    - percent: 100
      latestRevision: true
